name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Installs this package editable (so coverage collects); its core
      # `pacs008` dependency resolves from PyPI.
      - name: Install this package (+ pacs008 from PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install this package (pacs008 resolves from PyPI) so mypy can resolve
      # the `pacs008` imports.
      - name: Install this package (+ pacs008 from PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install ruff black mypy

      - name: Ruff check
        run: ruff check pacs008_mcp/

      - name: Black check
        run: black --check pacs008_mcp/ tests/

      - name: Mypy
        run: mypy pacs008_mcp/
